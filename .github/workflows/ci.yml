name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        go: ["1.25", "1.26"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Check gofumpt
        run: |
          go tool gofumpt -l . | tee /dev/stderr | diff - /dev/null
      - name: Run go vet
        run: |
          go vet ./...
      - name: Run go test
        run: |
          go test -cover -v -race ./...
